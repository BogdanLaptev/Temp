<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доступ по паролю</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }

        input[type="password"] {
            width: 80%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .error-message {
            color: red;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }

        .secret-content {
            display: none;
            margin-top: 20px;
        }

        .secret-content img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="container" id="loginBox">
    <h2>Что там</h2>
    <input type="password" id="passwordInput" placeholder="">
    <br>
    <button onclick="checkPassword()">Узнать правду</button>
    <div class="error-message" id="errorMsg">Всё напрасно</div>
</div>

<div class="secret-content" id="secretBox">
    <h2>Умничка!</h2>
    <!-- Замените ссылку ниже на адрес вашей картинки -->
    <img src="secret.jpg" alt="Секретное изображение">
</div>

<script>
    function checkPassword() {
        // Установите здесь ваш пароль
        const correctPassword = "674212"; 
        
        const userInput = document.getElementById("passwordInput").value;
        const loginBox = document.getElementById("loginBox");
        const secretBox = document.getElementById("secretBox");
        const errorMsg = document.getElementById("errorMsg");

        if (userInput === correctPassword) {
            // Прячем форму ввода и показываем контент
            loginBox.style.display = "none";
            secretBox.style.display = "block";
        } else {
            // Показываем ошибку, если пароль неверный
            errorMsg.style.display = "block";
            document.getElementById("passwordInput").value = ""; // Очищаем поле
        }
    }

    // Позволяет отправлять пароль по нажатию клавиши Enter
    document.getElementById("passwordInput").addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            checkPassword();
        }
    });
</script>

</body>
</html>
